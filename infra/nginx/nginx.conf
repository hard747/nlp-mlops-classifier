# Configuración global de eventos
events {
    worker_connections 1024;
}

http {
    # 🛡️ Zona de Rate Limiting: Protege la API de ataques de fuerza bruta o saturación
    # Permite máximo 10 peticiones por segundo por dirección IP
    limit_req_zone $binary_remote_addr zone=api_limit_zone:10m rate=10r/s;

    # Configuración del servidor proxy
    server {
        listen 80;
        server_name localhost;

        # Ocultar la versión de Nginx por seguridad (Mitigación de reconocimiento de vulnerabilidades)
        server_tokens off;

        # 🚀 Ruta principal hacia el contenedor de FastAPI
        location / {
            # Aplicar el límite de peticiones (Rate Limit) configurado arriba
            limit_req zone=api_limit_zone burst=5 nodelay;

            # Redirigir el tráfico HTTP hacia el nombre del servicio de Docker
            proxy_pass http://api_service:8000;
            
            # Inyección de cabeceras HTTP estándar para mantener la trazabilidad de la IP real
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Configuración de Timeouts para evitar conexiones colgadas
            proxy_connect_timeout 5s;
            proxy_read_timeout    60s;
        }
    }
}