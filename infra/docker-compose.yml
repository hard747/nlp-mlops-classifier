services:
  # 1. El Motor de Datos (Persistencia de Auditoría)
  postgres_db:
    image: postgres:16-alpine
    container_name: nlp_postgres_container
    environment:
      POSTGRES_USER: harre_admin
      POSTGRES_PASSWORD: super_secure_password_2026
      POSTGRES_DB: nlp_audit_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nlp_internal_network
    restart: always

  # 2. El Core del Negocio (Tu API de Inteligencia Artificial)
  api_service:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: nlp_fastapi_container
    environment:
      - DATABASE_URL=postgresql+asyncpg://harre_admin:super_secure_password_2026@postgres_db:5432/nlp_audit_db
      - MODEL_PATH=/app/src/infrastructure/ml_model/weights
    ports:
      - "8000:8000"
    volumes:
      # Local dev iteration without rebuilding the image on every retrain.
      - ../models/intent_classifier_customer_support:/app/src/infrastructure/ml_model/weights:ro
    depends_on:
      - postgres_db
    networks:
      - nlp_internal_network

  # 3. El Escudo Perimetral (Proxy Inverso y Seguridad)
  nginx_proxy:
    image: nginx:alpine
    container_name: nlp_nginx_container
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api_service
    networks:
      - nlp_internal_network

  # 4. Experiment tracking (training-time only, not part of the served product)
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.19.0
    container_name: nlp_mlflow_container
    command: >
      mlflow server
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    networks:
      - nlp_internal_network

  # 5. Infra/API metrics scraper
  # No depends_on api_service on purpose: Prometheus tolerates a target being
  # temporarily unreachable (it just shows the scrape as "down"), so the whole
  # observability stack can boot independently of whether the API has a
  # promoted model artifact yet.
  prometheus:
    image: prom/prometheus:latest
    container_name: nlp_prometheus_container
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - nlp_internal_network

  # 6. Dashboards: infra metrics (Prometheus) + business metrics (Postgres audit_logs)
  grafana:
    image: grafana/grafana:latest
    container_name: nlp_grafana_container
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - postgres_db
    networks:
      - nlp_internal_network

volumes:
  postgres_data:
  mlflow_data:
  prometheus_data:
  grafana_data:

networks:
  nlp_internal_network:
    driver: bridge