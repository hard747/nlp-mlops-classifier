name: NLP MLOps QA Pipeline

# 🚀 El robot vigilará cada push y cada Pull Request que intente entrar a develop
on:
  pull_request:
    branches: [ develop ]
  push:
    branches: [ develop, feature/nlp-9-ci-pipeline ]

jobs:
  continuous-integration:
    name: Code Quality & Unit Tests
    runs-on: ubuntu-latest

    steps:
    # 1. El robot descarga una copia exacta de tu código actual en su servidor temporal
    - name: Checkout del código
      uses: actions/checkout@v4

    # 2. Configura Python en un entorno nativo y limpio de Linux
    - name: Configurar Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. Cachea las descargas de pip para que el robot sea ultra veloz en ejecuciones consecutivas
    - name: Cachear dependencias de Python
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    # 4. Instala las dependencias del proyecto y las herramientas de auditoría (Linter y Test framework)
    - name: Instalar dependencias y herramientas de QA
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # 5. LINTING (Auditoría estática): Escanea que tus archivos no tengan errores de sintaxis o variables fantasmas
    - name: Control de calidad estático del código (Flake8)
      run: |
        # Falla el pipeline de inmediato si encuentra errores críticos de Python, código roto o variables no declaradas
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Lanza advertencias (sin romper el flujo) si hay líneas excesivamente largas o desórdenes visuales menores
        flake8 . --count --max-line-length=127 --statistics

    # 6. TESTING: Ejecuta las pruebas unitarias automáticas
    - name: Ejecutar pruebas unitarias (Pytest)
      run: |
        # Busca la carpeta de pruebas; si aún no has escrito tests, muestra una advertencia limpia sin tumbar al robot
        pytest tests/ || echo "INFO: No se encontraron tests configurados en este commit. Pasando validación inicial."