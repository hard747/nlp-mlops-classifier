name: Model Evaluation & Promotion

# Latent by design: compares the latest MLflow training run against the model
# aliased "production" and promotes it if it isn't worse (see train/promote_model.py).
# The local docker-compose MLflow instance is not reachable from a GitHub-hosted
# runner, so this job is a no-op until MLFLOW_TRACKING_URI is added as a repo
# secret pointing at a real, reachable MLflow server.
on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  evaluate-and-promote:
    name: Compare latest run against production, promote if not worse
    runs-on: ubuntu-latest
    # No job-level `if:` gate here on purpose: GitHub rejects the whole
    # workflow file as invalid when an `if:` references a secret that has
    # never been created in the repo. The no-op check happens at runtime instead.
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check MLFLOW_TRACKING_URI is configured
        id: check
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: |
          if [ -z "$MLFLOW_TRACKING_URI" ]; then
            echo "MLFLOW_TRACKING_URI not set, skipping (see workflow header)"
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python 3.11
        if: steps.check.outputs.configured == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install MLflow client
        if: steps.check.outputs.configured == 'true'
        run: pip install mlflow==2.17.2

      - name: Evaluate and promote
        if: steps.check.outputs.configured == 'true'
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: python train/promote_model.py
