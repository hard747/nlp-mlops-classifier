name: Minimal Test 3

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Poll something
      run: |
        for i in $(seq 1 3); do
          echo "try $i"
        done

    - name: Python heredoc test
      run: |
        response='{"a":1}'
        echo "$response"
        echo "$response" | python3 -c "
        import json, sys
        body = json.load(sys.stdin)
        assert 'a' in body
        "

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
