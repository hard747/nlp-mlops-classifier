name: Minimal Test 4

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build image
      run: docker build -t local/nlp-mlops-classifier:ci .

    - name: Boot the container
      run: |
        docker run -d --name nlp_api -p 8000:8000 \
          -e MODEL_PATH=hard717/intent-classifier-customer-support \
          local/nlp-mlops-classifier:ci

    - name: Tear down
      if: always()
      run: docker rm -f nlp_api || true

    - name: Trigger Render deploy
      if: ${{ secrets.RENDER_DEPLOY_HOOK_URL != '' }}
      run: curl -sf -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
